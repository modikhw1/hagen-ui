name: Deploy Supabase Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.PRODUCTION_PROJECT_ID }}
      DATABASE_URL: postgresql://postgres:${{ secrets.PRODUCTION_DB_PASSWORD }}@db.${{ secrets.PRODUCTION_PROJECT_ID }}.supabase.co:5432/postgres?sslmode=require

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations
        run: supabase db push

      - name: Verify required admin schema
        run: |
          psql "$DATABASE_URL" -tAc "select 1 from information_schema.columns where table_schema='public' and table_name='team_members' and column_name='commission_rate'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from information_schema.tables where table_schema='public' and table_name='settings'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from information_schema.tables where table_schema='public' and table_name='audit_log'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from information_schema.tables where table_schema='public' and table_name='cm_assignments'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from information_schema.tables where table_schema='public' and table_name='invoice_line_items'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from information_schema.tables where table_schema='public' and table_name='admin_idempotency_keys'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from information_schema.tables where table_schema='public' and table_name='admin_customer_action_locks'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from information_schema.columns where table_schema='public' and table_name='stripe_sync_log' and column_name='environment'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from information_schema.views where table_schema='public' and table_name='v_admin_billing_mrr'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from information_schema.views where table_schema='public' and table_name='v_admin_invoices'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from information_schema.views where table_schema='public' and table_name='v_admin_subscriptions'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from information_schema.views where table_schema='public' and table_name='v_admin_payroll_period'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from pg_proc p join pg_namespace n on n.oid = p.pronamespace where n.nspname='public' and p.proname='admin_get_customer_detail'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from pg_proc p join pg_namespace n on n.oid = p.pronamespace where n.nspname='public' and p.proname='admin_reassign_team_customers'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from pg_proc p join pg_namespace n on n.oid = p.pronamespace where n.nspname='public' and p.proname='admin_update_team_member'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from pg_proc p join pg_namespace n on n.oid = p.pronamespace where n.nspname='public' and p.proname='admin_convert_demo_to_customer'" | grep -q 1
          psql "$DATABASE_URL" -tAc "select 1 from pg_proc p join pg_namespace n on n.oid = p.pronamespace where n.nspname='public' and p.proname='admin_create_customer'" | grep -q 1

      - name: Deploy attention-maintenance
        run: supabase functions deploy attention-maintenance --no-verify-jwt

      - name: Deploy onboarding-tick
        run: supabase functions deploy onboarding-tick --no-verify-jwt
