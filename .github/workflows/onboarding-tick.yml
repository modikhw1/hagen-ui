name: Onboarding Tick

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  onboarding-tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: POST /api/cron/onboarding-tick
        run: |
          http_status=$(curl -s \
            -o /tmp/onboarding_response.json \
            -w "%{http_code}" \
            -X POST "${{ vars.APP_URL }}/api/cron/onboarding-tick" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          echo "HTTP status: $http_status"
          echo "Response:"
          jq '.' /tmp/onboarding_response.json 2>/dev/null || cat /tmp/onboarding_response.json

          if [ "$http_status" != "200" ]; then
            echo "Onboarding tick failed, expected 200 but got $http_status"
            exit 1
          fi
