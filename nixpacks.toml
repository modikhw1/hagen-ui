[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["corepack enable", "corepack prepare pnpm@latest --activate", "pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "cd artifacts/api-server && pnpm run build",
  "cd artifacts/letrend && PORT=3000 BASE_PATH=/ pnpm run build"
]

[start]
cmd = "cd artifacts/api-server && NODE_ENV=production pnpm run start"
