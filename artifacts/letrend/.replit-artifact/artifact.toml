kind = "web"
previewPath = "/"
title = "LeTrend"
version = "1.0.0"
id = "artifacts/letrend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25280

[services.development]
run = "pnpm --filter @workspace/letrend run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/letrend", "run", "build" ]
publicDir = "artifacts/letrend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25280"
BASE_PATH = "/"
